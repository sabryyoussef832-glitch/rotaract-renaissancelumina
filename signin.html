<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Rotaract Lumina</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --main-pink: #D91E5B;
            --light-pink: #FFF0F5;
            --pure-white: #ffffff;
            --soft-gray: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--light-pink) 0%, #ffe4ec 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            display: flex;
            max-width: 900px;
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(217, 30, 91, 0.1);
            border: 1px solid #fce4ec;
        }

        .login-image {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1000') no-repeat center center;
            background-size: cover;
            position: relative;
            display: none;
        }

        .login-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(217, 30, 91, 0.1);
        }

        @media (min-width: 768px) {
            .login-image { display: block; }
        }

        .login-form {
            flex: 1;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form h2 {
            color: var(--main-pink);
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .login-form p {
            color: #777;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--main-pink);
            opacity: 0.6;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1.5px solid #eee;
            border-radius: 15px;
            outline: none;
            background: var(--soft-gray);
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--main-pink);
            background: white;
            box-shadow: 0 0 10px rgba(217, 30, 91, 0.05);
        }

        .login-btn {
            background: var(--main-pink);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            background: #b5154a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(217, 30, 91, 0.2);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: wait;
            transform: none;
        }

        .forgot-pass {
            text-align: right;
            margin-top: 12px;
        }

        .forgot-pass a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .forgot-pass a:hover {
            color: var(--main-pink);
        }

        .signup-link {
            text-align: center;
            margin-top: 35px;
            font-size: 0.9rem;
            color: #666;
        }

        .signup-link a {
            color: var(--main-pink);
            text-decoration: none;
            font-weight: 700;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-image"></div>

        <div class="login-form">
            <h2>Welcome Back!</h2>
            <p>Please enter your details to stay connected with Lumina.</p>
            
            <form id="signinForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signin-email" name="email" placeholder="Email Address" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signin-password" name="password" placeholder="Password" required>
                </div>

                <div class="forgot-pass">
                    <a href="forgot-password.html">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="signup-link">
                New to the club? <a href="signup.html">Register Now</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : '';

        async function postToApi(path, payload) {
            const response = await fetch(`${API_BASE}${path}`, {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.error || 'Unable to sign in right now.');
            }

            return data;
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get('registered') === '1') {
            const email = params.get('email');
            if (email) {
                document.getElementById('signin-email').value = decodeURIComponent(email);
            }
            alert('Registration successful! Please login.');
        }
        if (params.get('logout') === '1') {
            alert('You have been logged out.');
        }
        if (params.get('error')) {
            alert(decodeURIComponent(params.get('error')));
        }

        async function handleSignin(event) {
            event.preventDefault();

            const email = document.getElementById('signin-email').value.trim().toLowerCase();
            const password = document.getElementById('signin-password').value;
            const submitButton = event.currentTarget.querySelector('.login-btn');

            submitButton.disabled = true;
            submitButton.textContent = 'Signing In...';

            try {
                const result = await postToApi('/api/signin', { email, password });
                localStorage.setItem('luminaUser', JSON.stringify(result.user));
                window.location.href = 'index.html';
            } catch (error) {
                alert(error.message);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Sign In';
            }
        }

        document.getElementById('signinForm').addEventListener('submit', handleSignin);
    </script>
</body>
</html>
